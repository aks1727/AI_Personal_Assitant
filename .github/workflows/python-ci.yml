name: Python CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install quality tools
        run: |
          pip install ruff pytest mypy

      - name: Compile all Python files
        run: |
          python -m compileall .

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Format check
        run: |
          ruff format --check .

      - name: Type checking
        run: |
          mypy . || true

      - name: Run tests
        run: |
          pytest
